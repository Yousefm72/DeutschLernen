        const summary = {
            title: "ZUSAMMENFASSUNG / ملخص",
            de: "Ein Junge, Andrew, bekommt ein Paket, das nicht für ihn bestimmt ist. Darin enthalten ist eine Schachtel mit Brillen. Er geht damit zu den Nachbarn, einen nach dem anderen, um herauszufinden, wem das Paket gehört. Er findet heraus, dass das Paket seinem Nachbarn Herr Edwards gehört, was ein wenig überraschend ist.",
            ar: "يحصل الصبي أندرو على طرد ليس موجهاً إليه. بداخله صندوق فيه نظارات. يذهب بها إلى الجيران واحداً تلو الآخر ليعرف لمن الطرد. يكتشف أن الطرد لجاره السيد إدواردز، وهذا مفاجئ قليلاً."
        };

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderStory() {
            const root = document.getElementById('storyRoot');
            storyLines.forEach((row, i) => {
                const block = document.createElement('div');
                block.className = 'story-line';
                block.innerHTML =
                    '<div class="line-de">' + escapeHtml(row.de) + '</div>' +
                    '<div class="playback-row">' +
                        '<span class="label-ar">تشغيل / إعدادات</span>' +
                        '<button type="button" class="play-button" data-idx="' + i + '" title="German audio">' + PLAY_SVG + '</button>' +
                        '<div class="rate-wrap">' +
                            '<span>Speed</span>' +
                            '<input type="range" class="line-rate" min="0.65" max="1.15" step="0.05" value="0.85" data-idx="' + i + '" aria-label="Speech rate for this line">' +
                            '<span class="line-rate-val">0.85</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="line-ar">' + escapeHtml(row.ar) + '</div>';
                root.appendChild(block);
            });

            root.querySelectorAll('.line-rate').forEach(sl => {
                sl.addEventListener('input', () => {
                    const v = sl.closest('.story-line').querySelector('.line-rate-val');
                    if (v) v.textContent = parseFloat(sl.value).toFixed(2);
                });
            });

            root.querySelectorAll('.play-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'), 10);
                    const line = btn.closest('.story-line');
                    const rateInput = line.querySelector('.line-rate');
                    const rate = rateInput ? parseFloat(rateInput.value) : 0.85;
                    const pitch = parseFloat(document.getElementById('globalPitch').value) || 1;
                    playLine(storyLines[idx].de, btn, rate, pitch);
                });
            });
        }

        function renderSummary() {
            const sec = document.getElementById('summarySection');
            sec.innerHTML =
                '<h2>' + escapeHtml(summary.title) + '</h2>' +
                '<div class="line-de" style="margin-bottom:0.75rem">' + escapeHtml(summary.de) + '</div>' +
                '<div class="playback-row">' +
                    '<button type="button" class="play-button" id="summaryPlay" title="Play summary">' + PLAY_SVG + '</button>' +
                    '<div class="rate-wrap">' +
                        '<span>Speed</span>' +
                        '<input type="range" id="summaryRate" min="0.65" max="1.15" step="0.05" value="0.8">' +
                        '<span id="summaryRateVal">0.80</span>' +
                    '</div>' +
                '</div>' +
                '<div class="line-ar">' + escapeHtml(summary.ar) + '</div>';

            document.getElementById('summaryRate').addEventListener('input', e => {
                document.getElementById('summaryRateVal').textContent = parseFloat(e.target.value).toFixed(2);
            });
            document.getElementById('summaryPlay').addEventListener('click', function () {
                const r = parseFloat(document.getElementById('summaryRate').value);
                const p = parseFloat(document.getElementById('globalPitch').value) || 1;
                playLine(summary.de, this, r, p);
            });
        }

        let currentBtn = null;

        function playLine(text, buttonElement, rate, pitch) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (currentBtn) {
                    currentBtn.classList.remove('playing');
                    currentBtn.innerHTML = PLAY_SVG;
                }
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.rate = rate;
            utterance.pitch = pitch;

            const btn = buttonElement;
            currentBtn = btn;
            if (btn) {
                btn.classList.add('playing');
                btn.innerHTML = STOP_SVG;
                utterance.onend = () => {
                    btn.classList.remove('playing');
                    btn.innerHTML = PLAY_SVG;
                    if (currentBtn === btn) currentBtn = null;
                };
                utterance.onerror = () => {
                    btn.classList.remove('playing');
                    btn.innerHTML = PLAY_SVG;
                    if (currentBtn === btn) currentBtn = null;
                };
            }

            window.speechSynthesis.speak(utterance);
        }

        function stopChapter() {
            window.speechSynthesis.cancel();
            chapterQueue = [];
            chapterIndex = 0;
            const b = document.getElementById('playChapterBtn');
            if (b) {
                b.classList.remove('playing');
                b.textContent = '▶ Kapitel abspielen';
            }
            document.querySelectorAll('.play-button.playing').forEach(x => {
                x.classList.remove('playing');
                x.innerHTML = PLAY_SVG;
            });
        }

        let chapterQueue = [];
        let chapterIndex = 0;

        function playNextInChapter() {
            if (chapterIndex >= chapterQueue.length) {
                stopChapter();
                return;
            }
            const { text, rate, pitch } = chapterQueue[chapterIndex];
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.rate = rate;
            utterance.pitch = pitch;
            utterance.onend = () => {
                chapterIndex++;
                playNextInChapter();
            };
            utterance.onerror = () => {
                chapterIndex++;
                playNextInChapter();
            };
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('globalRate').addEventListener('input', e => {
            document.getElementById('globalRateVal').textContent = parseFloat(e.target.value).toFixed(2);
        });

        document.getElementById('globalPitch').addEventListener('input', e => {
            document.getElementById('globalPitchVal').textContent = parseFloat(e.target.value).toFixed(2);
        });

        document.getElementById('playChapterBtn').addEventListener('click', function () {
            if (window.speechSynthesis.speaking && chapterQueue.length) {
                stopChapter();
                return;
            }
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            document.querySelectorAll('.play-button.playing').forEach(x => {
                x.classList.remove('playing');
                x.innerHTML = PLAY_SVG;
            });
            currentBtn = null;

            const chapterRate = parseFloat(document.getElementById('globalRate').value);
            const pitch = parseFloat(document.getElementById('globalPitch').value) || 1;
            chapterQueue = storyLines.map(row => ({
                text: row.de,
                rate: chapterRate,
                pitch
            }));
            chapterIndex = 0;
            this.classList.add('playing');
            this.textContent = '■ Stop';
            playNextInChapter();
        });

        renderStory();
        renderSummary();
    </script>
</body>
</html>
